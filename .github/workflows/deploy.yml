name: Deploy to DigitalOcean

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_USER: ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_IP }}
      PROJECT_PATH: /home/${{ secrets.SERVER_USERNAME }}/little-daisy
      SSH_FILE: /home/${{ secrets.SERVER_USERNAME }}/.ssh/ed25519_github_personal

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }}  >> ~/.ssh/known_hosts

      - name: Add SSH Key to the ssh-agent
        run: |
          ssh ${{ env.DEPLOY_USER }} 'chmod 600 ${{ env.SSH_FILE }} && eval "$(ssh-agent -s)" && ssh-add ${{ env.SSH_FILE }}'

      - name: Check for .env file
        run: |
          ssh ${{ env.DEPLOY_USER }} 'if [ ! -f ${{ env.PROJECT_PATH }}/.env ]; then echo ".env file is missing" && exit 1; fi'

      - name: Pull the latest code on Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "*** Changing to the project directory ***"
            cd ${{ env.PROJECT_PATH }}
            pwd
            echo "*** Pulling the latest code. ***"
            GIT_SSH_COMMAND="ssh -i ${{ env.SSH_FILE }}" git pull origin production
            if [ $? -eq 0 ]; then
              echo "*** Git pull successful. Stopping and removing old Docker containers. ***"
              docker-compose down
              echo "*** Rebuilding and starting Docker containers. ***"
              docker-compose up -d --build --remove-orphans
            else
              echo "*** Git pull failed. Skipping Docker rebuild. ***"
              exit 1
            fi
            echo "*** Finished. ***"

      - name: Check Docker containers are running
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ $(docker inspect -f '{{.State.Running}}' shonlittle-nginx) = "true" ]; then
              echo "*** The shonlittle-nginx container is running! ***"
            else
              echo "*** The shonlittle-nginx container is not running! ***"
              exit 1
            fi
            docker ps
